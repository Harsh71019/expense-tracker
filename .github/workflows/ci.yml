name: CI

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: "Secret scan (gitleaks)"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @treasury-ops/shared build

      - name: "Lint — shared"
        run: pnpm --filter @treasury-ops/shared lint
      - name: "Lint — backend (api)"
        run: pnpm --filter @treasury-ops/api lint
      - name: "Architecture — backend circular dependencies"
        run: pnpm --filter @treasury-ops/api check:circular
      - name: "Lint — frontend (web)"
        run: pnpm --filter @treasury-ops/web lint
      - name: "Architecture — frontend circular dependencies"
        run: pnpm --filter @treasury-ops/web check:circular

      - name: "Typecheck — shared"
        run: pnpm --filter @treasury-ops/shared typecheck
      - name: "Typecheck — backend (api)"
        run: pnpm --filter @treasury-ops/api typecheck
      - name: "Typecheck — frontend (web)"
        run: pnpm --filter @treasury-ops/web typecheck

      - name: "Unit tests — shared"
        run: pnpm --filter @treasury-ops/shared test
      - name: "Unit tests — backend (api)"
        run: pnpm --filter @treasury-ops/api test
      - name: "Unit tests — frontend (web)"
        run: pnpm --filter @treasury-ops/web test

      - name: "Integration tests — backend (api)"
        run: pnpm --filter @treasury-ops/api test:integration

      - name: "Migration verification — backend"
        run: pnpm verify:migrations

      - name: "Build — backend (api)"
        run: pnpm --filter @treasury-ops/api build
      - name: "Build — frontend (web)"
        run: pnpm --filter @treasury-ops/web build

      - name: "Security scan (Trivy)"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL
          exit-code: "1"
