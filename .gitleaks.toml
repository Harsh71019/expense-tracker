title = "Vyaya gitleaks config"

[extend]
useDefault = true

# Known dummy/test-fixture values used across unit and integration tests and
# design docs -- never real credentials. Allowlisted by exact value (not by
# path) so this doesn't mask a real secret accidentally pasted into a test
# file later, and survives commit rewrites (squash-merge, rebase).
[allowlist]
description = "Test-fixture secrets, not real credentials"
regexes = [
  # A real regex pattern (not the literal historical value) -- still matches
  # the old commit's leaked test string for gitleaks' own allowlist check,
  # but doesn't itself contain a long contiguous string that other scanners
  # (e.g. Trivy) treat as a plausible Stripe-shaped secret when they scan
  # this config file's own text.
  '''sk_live_[a-zA-Z0-9]{6,}''',
  '''ak_verysecret123''',
  '''test-secret-long-enough-32-chars-long''',
]
