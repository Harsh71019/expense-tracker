services:
  migrate:
    environment:
      MONGODB_URI: mongodb://mongodb:27017/vyaya?replicaSet=rs0
    depends_on:
      mongodb:
        condition: service_healthy

  api:
    environment:
      MONGODB_URI: mongodb://mongodb:27017/vyaya?replicaSet=rs0
      REDIS_URL: redis://redis:6379
      TRUSTED_ORIGINS: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy

  worker:
    environment:
      MONGODB_URI: mongodb://mongodb:27017/vyaya?replicaSet=rs0
      REDIS_URL: redis://redis:6379
      TRUSTED_ORIGINS: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:latest
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "try { rs.status().ok } catch { rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongodb:27017'}]}); 1 }"
        ]
      interval: 5s
      timeout: 5s
      retries: 20
