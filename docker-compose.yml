services:
  # One-shot: runs migrate-mongo up, exits 0. Gates everything else.
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command:
      [
        "node",
        "node_modules/migrate-mongo/bin/migrate-mongo.js",
        "up",
        "-f",
        "migrate-mongo-config.cjs"
      ]
    env_file: .env
    networks:
      - vyaya-net
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      SERVICE_ROLE: api
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - vyaya-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4000/api/readyz', (response) => process.exit(response.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["node", "dist/worker.js"]
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      SERVICE_ROLE: worker
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - vyaya-net
    healthcheck:
      test: ["CMD", "node", "dist/worker-health.js"] # pings its own heartbeat key in redis
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked at build time into the Next.js client bundle
        NEXT_PUBLIC_API_URL: /api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - vyaya-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # The ONLY exposed container. /api/* -> NestJS, /* -> Next.js SSR.
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "3006:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - vyaya-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "noeviction"
      ]
    volumes:
      - redis-data:/data
    networks:
      - vyaya-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  vyaya-net:
    driver: bridge

volumes:
  redis-data:
