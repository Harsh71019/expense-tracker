services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: vyaya
      POSTGRES_USER: vyaya
    ports:
      - "5433:5432" # host-side port, avoids clashing with any existing local postgres
    volumes:
      - vyaya-postgres-data:/var/lib/postgresql
    networks:
      - vyaya-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vyaya -d vyaya"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: &json_logging
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  # One-shot: runs migrate-mongo up, exits 0. Gates everything else.
  migrate:
    image: vyaya-api:local
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command:
      ["node_modules/migrate-mongo/bin/migrate-mongo.js", "up", "-f", "migrate-mongo-config.cjs"]
    env_file: .env
    networks:
      - vyaya-net
    restart: "no"
    logging: *json_logging

  api:
    image: vyaya-api:local
    pull_policy: never
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      SERVICE_ROLE: api
      GIT_SHA: ${GIT_SHA:-development}
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - vyaya-net
    logging: *json_logging
    healthcheck:
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "require('http').get('http://localhost:4000/api/readyz', (response) => process.exit(response.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    image: vyaya-api:local
    pull_policy: never
    command: ["dist/worker.js"]
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      SERVICE_ROLE: worker
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - vyaya-net
    logging: *json_logging
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "dist/worker-health.js"] # pings its own heartbeat key in redis
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked at build time into the Next.js client bundle
        NEXT_PUBLIC_API_URL: /api
        INTERNAL_API_URL: http://api:4000/api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - vyaya-net
    logging: *json_logging
    healthcheck:
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "require('http').get('http://localhost:3000/login', (response) => process.exit(response.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # The ONLY exposed container. /api/* -> NestJS, /* -> Next.js SSR.
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "3006:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - vyaya-net
    logging: *json_logging

networks:
  vyaya-net:
    driver: bridge

volumes:
  vyaya-postgres-data:
