services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: treasury_ops
      POSTGRES_USER: treasury_ops
    ports:
      # Bind to loopback by default -- reachable as localhost:5433 for local dev (matches
      # .env.development.local.example) and from the deploy host itself, but not from the
      # LAN/internet. Set POSTGRES_BIND_ADDR=0.0.0.0 in .env only if you deliberately need to
      # reach this Postgres from another machine (e.g. a GUI client on your LAN) -- never in
      # production, where the app containers are the only intended clients.
      - "${POSTGRES_BIND_ADDR:-127.0.0.1}:5433:5432"
    volumes:
      - treasury-ops-postgres-data:/var/lib/postgresql
    networks:
      - treasury-ops-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treasury_ops -d treasury_ops"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: &json_logging
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  # One-shot: runs drizzle-kit migrate, exits 0. Gates everything else.
  migrate:
    image: treasury-ops-api:local
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    # node_modules/.bin/drizzle-kit is a POSIX shell shim (pnpm's bin wrapper) --
    # this image's fixed entrypoint runs `node <args>` directly, which can't
    # execute a shell script. Invoke drizzle-kit's real JS entrypoint instead.
    command: ["node_modules/drizzle-kit/bin.cjs", "migrate"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - treasury-ops-net
    restart: "no"
    logging: *json_logging

  api:
    image: treasury-ops-api:local
    pull_policy: never
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      SERVICE_ROLE: api
      GIT_SHA: ${GIT_SHA:-development}
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - treasury-ops-net
    logging: *json_logging
    healthcheck:
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "require('http').get('http://localhost:4000/api/readyz', (response) => process.exit(response.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    image: treasury-ops-api:local
    pull_policy: never
    command: ["dist/worker.js"]
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      SERVICE_ROLE: worker
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - treasury-ops-net
    logging: *json_logging
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "dist/worker-health.js"] # pings its own heartbeat key in redis
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked at build time into the Next.js client bundle
        NEXT_PUBLIC_API_URL: /api
        INTERNAL_API_URL: http://api:4000/api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - treasury-ops-net
    logging: *json_logging
    healthcheck:
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "require('http').get('http://localhost:3000/login', (response) => process.exit(response.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # The ONLY exposed container. /api/* -> NestJS, /* -> Next.js SSR.
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "3006:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - treasury-ops-net
    logging: *json_logging

networks:
  treasury-ops-net:
    driver: bridge

volumes:
  treasury-ops-postgres-data:
