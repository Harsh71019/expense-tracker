# /opt/apps/treasury-ops/deploy/nginx.conf
# Single entry point on host port 3006.
#   /api/*      -> NestJS (includes /api/auth/* for Better Auth)
#   everything  -> Next.js SSR

upstream treasury-ops_api { server api:4000; }
upstream treasury-ops_web { server web:3000; }

server {
    listen 80;
    server_name _;

    # CSV uploads go through here — match the API's 5MB cap
    client_max_body_size 6m;

    # --- API ---
    location /api/ {
        proxy_pass http://treasury-ops_api;          # path preserved: /api/... hits Nest's global prefix
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;               # import commit responses can take a moment
    }

    # --- Bull Board (queue dashboard, auth-guarded by the API itself) ---
    location /admin/queues {
        proxy_pass http://treasury-ops_api;
        proxy_set_header Host $host;
    }

    # --- Next.js (SSR + static + HMR-safe websockets) ---
    location / {
        proxy_pass http://treasury-ops_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Preserve the external port. Next.js compares this value with the
        # browser Origin before accepting cookie-backed Server Actions.
        proxy_set_header Host       $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache Next.js immutable build assets hard
    location /_next/static/ {
        proxy_pass http://treasury-ops_web;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
